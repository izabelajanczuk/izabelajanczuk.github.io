        <div class="field">
          <label>Name</label>

            <div>

  <script src="script.js"></script>

  <!-- ============================================================
       CONTACT FORM — makes the form actually send to your inbox,
       without your email ever appearing on the website.

       SET-UP (one time, ~3 minutes):
       1. Go to  https://formspree.io  and create a free account.
       2. Make a new form; it gives you an address that looks like
          https://formspree.io/f/abcwxyz
       3. Paste that whole address between the quotes below,
          replacing PASTE_YOUR_FORMSPREE_ADDRESS_HERE.
       Until you do that, the form will show a friendly reminder.
       ============================================================ -->
  <script>
    const FORMSPREE_ENDPOINT = "https://formspree.io/f/maqgadkk";

    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (FORMSPREE_ENDPOINT === "PASTE_YOUR_FORMSPREE_ADDRESS_HERE") {
        status.textContent = "⚙️ Almost there — the form needs its Formspree address added (see the note in contact.html).";
        return;
      }

      status.textContent = "Sending…";
      try {
        const res = await fetch(FORMSPREE_ENDPOINT, {
          method: "POST",
          headers: { "Accept": "application/json" },
          body: new FormData(form),
        });
        if (res.ok) {
          form.reset();
          status.textContent = "Thank you! Your message has been sent. 🌿";
        } else {
          status.textContent = "Something went wrong — please try again in a moment.";
        }
      } catch {
        status.textContent = "Couldn't send right now — please check your connection and try again.";
      }
    });
  </script>
</body>
</html>
