<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown to Chianti's Birthday 🎂</title>

  <!-- Free Google Fonts. "Orbitron" = the digital neon timer look.
       "Baloo 2" = the friendly rounded heading look.
       If there is ever no internet, the browser falls back to normal fonts. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Orbitron:wght@700;900&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============================================================
       CONFETTI LAYER
       A see-through canvas that covers the whole screen.
       Normally empty. On August 8th, script.js fills it with confetti.
       ============================================================ -->
  <canvas id="confetti"></canvas>

  <!-- ============================================================
       THE WALL CLOCK (top of the page)
       Its own little drawing. The hands are set to the real Pacific
       time by script.js, and the pendulum swings back and forth.
       ============================================================ -->
  <svg id="clock" viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg" aria-label="Wall clock">
    <!-- nail/hook on the wall and the two cords the clock hangs from -->
    <line x1="200" y1="24" x2="150" y2="74" stroke="#3a2a55" stroke-width="6" stroke-linecap="round" />
    <line x1="200" y1="24" x2="250" y2="74" stroke="#3a2a55" stroke-width="6" stroke-linecap="round" />
    <circle cx="200" cy="22" r="9" fill="#3a2a55" />

    <!-- the round clock case -->
    <circle cx="200" cy="160" r="128" fill="#fff3da" stroke="#b9892f" stroke-width="14" />
    <circle cx="200" cy="160" r="118" fill="#fffaf0" stroke="#e9c97a" stroke-width="3" />

    <!-- tick marks and the 12/3/6/9 numbers are added by script.js -->
    <g id="clockTicks"></g>

    <!-- the three hands. script.js rotates these to the real time. -->
    <line id="hourHand"   x1="200" y1="160" x2="200" y2="98"  stroke="#3a2a55" stroke-width="11" stroke-linecap="round" />
    <line id="minuteHand" x1="200" y1="160" x2="200" y2="66"  stroke="#3a2a55" stroke-width="8"  stroke-linecap="round" />
    <line id="secondHand" x1="200" y1="174" x2="200" y2="58"  stroke="#ff3b6b" stroke-width="3"  stroke-linecap="round" />
    <circle cx="200" cy="160" r="9" fill="#3a2a55" />

    <!-- THE PENDULUM. script.js rotates this group around the pivot at (200,288). -->
    <g id="pendulum">
      <line x1="200" y1="288" x2="200" y2="430" stroke="#b9892f" stroke-width="7" stroke-linecap="round" />
      <circle cx="200" cy="452" r="34" fill="#ffd34d" stroke="#b9892f" stroke-width="7" />
      <circle cx="200" cy="452" r="14" fill="#b9892f" />
    </g>
  </svg>

  <!-- ============================================================
       THE MAINE COON CAT  (big — fills most of the page)
       Everything cat-related lives in this one drawing so it all
       scales together and stays lined up: eyes, hat, and the timer.
       viewBox is 1600 wide x 920 tall; the cat is drawn to fill it.
       ============================================================ -->
  <svg id="cat" viewBox="0 0 1600 920" preserveAspectRatio="xMidYMax slice"
       xmlns="http://www.w3.org/2000/svg" aria-label="Maine Coon cat named Chianti">

    <defs>
      <!-- amber/green eye color -->
      <radialGradient id="iris" cx="50%" cy="42%" r="62%">
        <stop offset="0%"  stop-color="#d6f06a" />
        <stop offset="55%" stop-color="#9bcb3c" />
        <stop offset="100%" stop-color="#5f7d12" />
      </radialGradient>

      <!-- the green neon glow used by the timer text -->
      <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="5" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- soft fur shading on the torso -->
      <linearGradient id="furShade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#b07b45" />
        <stop offset="100%" stop-color="#8a5c2e" />
      </linearGradient>
    </defs>

    <!-- ---- big fluffy tail curling up behind the torso ---- -->
    <path d="M1300,920 C1480,860 1600,620 1500,440 C1455,365 1345,375 1338,448
             C1382,505 1320,650 1190,735 C1190,815 1235,885 1300,920 Z"
          fill="#7a5128" />
    <path d="M1450,500 q-44,32 -22,86 M1382,650 q-54,22 -44,86" stroke="#5d3c1d" stroke-width="15"
          fill="none" stroke-linecap="round" />

    <!-- ---- TORSO (spans the full width, bleeds off both bottom edges) ---- -->
    <path d="M-60,920
             C-30,690 160,500 380,475
             C560,455 600,470 800,470
             C1000,470 1040,455 1220,475
             C1440,500 1630,690 1660,920 Z"
          fill="url(#furShade)" />

    <!-- chest ruff (lighter fluffy fur under the chin) -->
    <path d="M800,486 C636,496 568,664 632,856 C696,980 904,980 968,856
             C1032,664 964,496 800,486 Z" fill="#e8c79a" />

    <!-- front paws -->
    <ellipse cx="612" cy="876" rx="104" ry="60" fill="#9a6a39" />
    <ellipse cx="988" cy="876" rx="104" ry="60" fill="#9a6a39" />
    <path d="M572,872 v36 M612,875 v40 M652,872 v36" stroke="#6e4a26" stroke-width="6" stroke-linecap="round" />
    <path d="M948,872 v36 M988,875 v40 M1028,872 v36" stroke="#6e4a26" stroke-width="6" stroke-linecap="round" />

    <!-- ---- EARS (tall, tufted "lynx tips") ---- -->
    <path d="M650,250 L585,48  L835,210 Z" fill="#8a5c2e" />
    <path d="M950,250 L1015,48 L765,210 Z" fill="#8a5c2e" />
    <path d="M666,232 L622,96  L796,206 Z" fill="#d98c8c" />
    <path d="M934,232 L978,96  L804,206 Z" fill="#d98c8c" />
    <!-- white ear tufts -->
    <path d="M585,48 l12,46 M585,48 l-16,40 M585,48 l34,30" stroke="#f3e7d4" stroke-width="6" stroke-linecap="round" />
    <path d="M1015,48 l-12,46 M1015,48 l16,40 M1015,48 l-34,30" stroke="#f3e7d4" stroke-width="6" stroke-linecap="round" />

    <!-- ---- HEAD (large) ---- -->
    <circle cx="800" cy="330" r="212" fill="#a06f3e" />

    <!-- cheek fur tufts on each side -->
    <path d="M598,330 l-92,-34 M596,372 l-98,12 M604,414 l-86,52" stroke="#c79a64" stroke-width="11" stroke-linecap="round" />
    <path d="M1002,330 l92,-34 M1004,372 l98,12 M996,414 l86,52"  stroke="#c79a64" stroke-width="11" stroke-linecap="round" />

    <!-- forehead tabby "M" marking -->
    <path d="M716,205 l18,92 M800,182 v96 M884,205 l-18,92" stroke="#5d3c1d" stroke-width="11" stroke-linecap="round" fill="none" />

    <!-- whisker pads (muzzle), drawn before nose/mouth -->
    <ellipse cx="752" cy="416" rx="58" ry="42" fill="#f0ddc4" />
    <ellipse cx="848" cy="416" rx="58" ry="42" fill="#f0ddc4" />

    <!-- ---- EYES (big; pupils are moved UP toward the pendulum by script.js) ---- -->
    <!-- left eye -->
    <ellipse cx="705" cy="312" rx="60" ry="68" fill="url(#iris)" />
    <g id="leftPupil"><ellipse cx="705" cy="312" rx="19" ry="42" fill="#1c130b" /></g>
    <circle cx="724" cy="284" r="12" fill="#ffffff" opacity="0.9" />
    <path d="M642,294 Q705,256 768,294" fill="none" stroke="#2a1b0e" stroke-width="11" stroke-linecap="round" />

    <!-- right eye -->
    <ellipse cx="895" cy="312" rx="60" ry="68" fill="url(#iris)" />
    <g id="rightPupil"><ellipse cx="895" cy="312" rx="19" ry="42" fill="#1c130b" /></g>
    <circle cx="914" cy="284" r="12" fill="#ffffff" opacity="0.9" />
    <path d="M832,294 Q895,256 958,294" fill="none" stroke="#2a1b0e" stroke-width="11" stroke-linecap="round" />

    <!-- ---- NOSE + MOUTH ---- -->
    <path d="M772,408 L828,408 L800,440 Z" fill="#c96f74" />
    <path d="M800,440 v22" stroke="#5d3c1d" stroke-width="7" stroke-linecap="round" />
    <path d="M800,462 Q766,490 738,470 M800,462 Q834,490 862,470" fill="none" stroke="#5d3c1d" stroke-width="7" stroke-linecap="round" />

    <!-- whiskers -->
    <path d="M700,414 l-190,-28 M700,436 l-194,8 M700,458 l-186,42" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.85" />
    <path d="M900,414 l190,-28 M900,436 l194,8 M900,458 l186,42"   stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.85" />

    <!-- ---- BIRTHDAY HAT (hidden until August 8th; shown by script.js) ---- -->
    <g id="catHat" style="display:none">
      <path d="M690,150 L800,18 L910,150 Z" fill="#ff4d9d" />
      <path d="M690,150 L800,18 L800,150 Z" fill="#ffd34d" opacity="0.85" />
      <path d="M706,118 L894,118 M722,86 L878,86 M740,52 L860,52" stroke="#7a2fd6" stroke-width="8" stroke-linecap="round" />
      <ellipse cx="800" cy="152" rx="124" ry="17" fill="#ffe08a" />
      <circle cx="800" cy="14" r="18" fill="#6be3ff" />
    </g>

    <!-- ============================================================
         THE NEON COUNTDOWN TIMER (sits on Chianti's chest)
         A dark rounded sign for contrast, then glowing green numbers
         laid out in four columns so they always fit inside the box.
         script.js updates each number every second.
         ============================================================ -->
    <rect x="455" y="588" width="690" height="150" rx="30"
          fill="#1a0f33" opacity="0.9" stroke="#39ff14" stroke-width="2" />

    <text id="caption" class="neon-small" x="800" y="570" text-anchor="middle">🎂 COUNTDOWN TO CHIANTI'S BIRTHDAY 🎂</text>

    <!-- four number columns -->
    <text id="tDays"  class="neon-big" x="575"  y="678" text-anchor="middle">00</text>
    <text id="tHours" class="neon-big" x="725"  y="678" text-anchor="middle">00</text>
    <text id="tMins"  class="neon-big" x="875"  y="678" text-anchor="middle">00</text>
    <text id="tSecs"  class="neon-big" x="1025" y="678" text-anchor="middle">00</text>

    <!-- colons between the columns -->
    <text class="neon-big" x="650" y="674" text-anchor="middle">:</text>
    <text class="neon-big" x="800" y="674" text-anchor="middle">:</text>
    <text class="neon-big" x="950" y="674" text-anchor="middle">:</text>

    <!-- little labels under each column -->
    <text class="neon-label" x="575"  y="720" text-anchor="middle">DAYS</text>
    <text class="neon-label" x="725"  y="720" text-anchor="middle">HOURS</text>
    <text class="neon-label" x="875"  y="720" text-anchor="middle">MINS</text>
    <text class="neon-label" x="1025" y="720" text-anchor="middle">SECS</text>
  </svg>

  <script src="script.js"></script>
</body>
</html>
